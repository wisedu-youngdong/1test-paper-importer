<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1test 시험지 문항 분석기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #F5F6F8;
    color: #1A1A1A;
    padding: 2rem 1rem;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #0D2D6B; }
  .subtitle { font-size: 14px; color: #6B7280; margin-bottom: 1.5rem; }
  .label { font-size: 12px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .drop {
    border: 2px dashed #D1D5DB; border-radius: 12px; padding: 2rem; text-align: center;
    cursor: pointer; transition: all .15s; margin-bottom: 1rem; background: #fff;
  }
  .drop:hover, .drop.over { background: #F0F7FF; border-color: #1A5CB8; }
  .drop .main { font-size: 14px; font-weight: 500; }
  .drop .sub { font-size: 12px; color: #6B7280; margin-top: 3px; }
  .file-chip {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #ECFDF5; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #A7F3D0;
  }
  .file-chip span { font-size: 13px; font-weight: 500; color: #047857; flex: 1; }
  .file-chip button { background: none; border: none; cursor: pointer; color: #047857; font-size: 16px; }
  .btn-go {
    width: 100%; padding: 12px; border-radius: 8px; background: #1A5CB8; color: #fff;
    border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 1rem;
  }
  .btn-go:hover { background: #0D2D6B; }
  .btn-go:disabled { opacity: .4; cursor: not-allowed; }
  .progress { height: 4px; border-radius: 2px; background: #E5E7EB; overflow: hidden; margin-bottom: .5rem; display: none; }
  .progress-bar { height: 100%; background: #1A5CB8; width: 0%; transition: width .4s; }
  .status-msg { font-size: 12px; color: #6B7280; text-align: center; margin-bottom: 1rem; min-height: 16px; }
  .err-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #B91C1C; margin-bottom: 1rem; display: none; }
  .result-wrap { display: none; }
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
  .stat { background: #F5F6F8; border-radius: 8px; padding: 12px; text-align: center; }
  .stat .n { font-size: 24px; font-weight: 700; color: #0D2D6B; }
  .stat .t { font-size: 11px; color: #6B7280; margin-top: 2px; }
  .item-row { border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
  .item-row.set-item { border-color: #FDE68A; background: #FFFBEB; }
  .item-row input[type=checkbox] { margin-top: 4px; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
  .num-badge {
    width: 28px; height: 28px; border-radius: 50%; background: #DBEAFE; color: #1A5CB8;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .num-badge.warn { background: #F59E0B; color: #fff; }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 13px; font-weight: 600; }
  .item-sub { font-size: 11px; color: #6B7280; margin-top: 2px; }
  .item-passage { font-size: 12px; color: #374151; margin-top: 6px; line-height: 1.55; background: #F9FAFB; border-radius: 4px; padding: 8px 10px; border-left: 3px solid #1A5CB8; }
  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; margin-left: 6px; }
  .tag-blue { background: #DBEAFE; color: #1A5CB8; }
  .tag-warn { background: #FEF3C7; color: #92400E; }
  .tag-green2 { background: #D1FAE5; color: #047857; }
  .tag-purple { background: #EDE9FE; color: #6D28D9; }
  .tag-set { background: #FFE4E6; color: #BE123C; }
  input[type=file] { display: none; }

  /* === 2단계: 생성 설정 === */
  .select-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .select-bar .count { font-size: 13px; color: #1A5CB8; font-weight: 600; }
  .select-bar button { background: none; border: none; color: #6B7280; font-size: 12px; cursor: pointer; text-decoration: underline; }
  .gen-panel { display: none; }
  .gen-row { margin-bottom: 14px; }
  .gen-row label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { font-size: 14px; font-weight: 700; color: #1A5CB8; min-width: 36px; text-align: right; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-opt {
    border: 1px solid #E5E7EB; border-radius: 8px; padding: 9px 12px; cursor: pointer;
    font-size: 13px; color: #374151; transition: all .15s; user-select: none;
  }
  .type-opt:hover { border-color: #1A5CB8; }
  .type-opt.on { border-color: #1A5CB8; background: #EFF6FF; color: #1A5CB8; font-weight: 600; }
  .type-group { margin-bottom: 12px; }
  .type-group-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .btn-gen {
    width: 100%; padding: 12px; border-radius: 8px; background: #0D2D6B; color: #fff;
    border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }
  .btn-gen:hover { background: #082050; }
  .btn-gen:disabled { opacity: .4; cursor: not-allowed; }
  .gen-result { display: none; margin-top: 1.5rem; }
  .gen-q-card { border: 1px solid #E5E7EB; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; background: #fff; }
  .gen-q-head { font-size: 12px; color: #1A5CB8; font-weight: 700; margin-bottom: 6px; }
  .gen-q-text { font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
  .gen-q-opts { font-size: 13px; color: #374151; line-height: 1.9; }
  .gen-q-answer { font-size: 12px; color: #047857; margin-top: 8px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <h1>1test 시험지 문항 분석기</h1>
  <p class="subtitle">수능/모의고사 PDF를 업로드하면 문항 구조를 자동으로 분석합니다</p>

  <div class="drop" id="dropzone" onclick="document.getElementById('fi').click()">
    <div class="main">클릭 또는 드래그로 PDF 업로드</div>
    <div class="sub">수능 · 모의고사 기출 디지털 PDF</div>
  </div>
  <input type="file" id="fi" accept=".pdf">

  <div id="fileChip" style="display:none" class="file-chip">
    <span id="fname"></span>
    <button onclick="removeFile()">✕</button>
  </div>

  <div class="err-box" id="errBox"></div>

  <button class="btn-go" id="goBtn" disabled>문항 분석 시작</button>

  <div class="progress" id="prog"><div class="progress-bar" id="progBar"></div></div>
  <div class="status-msg" id="statusMsg"></div>

  <div class="result-wrap" id="resultWrap">
    <div class="label">인식 결과</div>
    <div class="stat-row">
      <div class="stat"><div class="n" id="statItems">-</div><div class="t">총 문항</div></div>
      <div class="stat"><div class="n" id="statSets">-</div><div class="t">다문항 세트</div></div>
      <div class="stat"><div class="n" id="statWords">-</div><div class="t">평균 단어수</div></div>
    </div>

    <div class="select-bar">
      <span class="count" id="selCount">0개 선택됨</span>
      <button onclick="toggleAll()">전체 선택/해제</button>
    </div>

    <div id="itemList"></div>

    <button class="btn-go" id="toGenBtn" style="margin-top:1rem" disabled onclick="openGenPanel()">선택한 문항으로 문제 생성 설정 →</button>
  </div>

  <!-- === 2단계: 생성 설정 패널 === -->
  <div class="card gen-panel" id="genPanel">
    <div class="label">문제 생성 설정</div>

    <div class="gen-row">
      <label>문항 배수 (선택 문항당 생성할 문제 수)</label>
      <div class="slider-row">
        <input type="range" id="multSlider" min="1" max="5" value="2" step="1">
        <span class="val" id="multVal">2배</span>
      </div>
    </div>

    <div class="gen-row">
      <label>난이도 조정</label>
      <div class="slider-row">
        <input type="range" id="diffSlider" min="-1" max="1" value="0" step="1">
        <span class="val" id="diffVal" style="font-size:12px">원본</span>
      </div>
    </div>

    <div class="gen-row">
      <label>문제 유형 (복수 선택 가능)</label>
      <div id="typeGroups"></div>
    </div>

    <button class="btn-gen" id="genBtn">문제 생성하기</button>
    <div class="progress" id="genProg"><div class="progress-bar" id="genProgBar"></div></div>
    <div class="status-msg" id="genStatusMsg"></div>
    <div class="err-box" id="genErrBox"></div>
  </div>

  <div class="gen-result" id="genResult">
    <div class="label">생성된 문제</div>
    <div id="genQList"></div>
  </div>

</div>

<script>
let pdfFile = null;
let analyzedItems = [];
let analyzedSets = [];
const dropzone = document.getElementById('dropzone');
const fi = document.getElementById('fi');
const goBtn = document.getElementById('goBtn');

// === 공식 문항 유형 카테고리 (18~45번 기준, 읽기 영역) ===
const QUESTION_CATEGORIES = [
  { group: "정보확인형", types: ["글의목적", "주장/시사", "일치/불일치(도표자료)", "일치/불일치(내용)", "일치/불일치(실용자료)"] },
  { group: "내용이해형", types: ["심경/분위기", "밑줄함축의미", "요지", "주제", "제목"] },
  { group: "언어분석형", types: ["문맥속어법(밑줄형)", "문맥속어법(선택형)", "문맥속어휘(밑줄형)", "문맥속어휘(선택형)"] },
  { group: "논리구성형", types: ["빈칸추론", "무관한문장찾기", "글의순서배열", "문장삽입", "문장요약"] },
  { group: "장문독해", types: ["장문독해(1지문2문항)", "장문독해(1지문3문항)"] }
];

function findGroup(typeName) {
  const found = QUESTION_CATEGORIES.find(c => c.types.includes(typeName));
  return found ? found.group : null;
}

// 그룹별 태그 색상
const GROUP_COLORS = {
  "정보확인형": "tag-blue",
  "내용이해형": "tag-green2",
  "언어분석형": "tag-purple",
  "논리구성형": "tag-warn",
  "장문독해": "tag-set"
};

function renderTypeGroups() {
  const wrap = document.getElementById('typeGroups');
  wrap.innerHTML = '';
  QUESTION_CATEGORIES.forEach(cat => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'type-group';

    const label = document.createElement('div');
    label.className = 'type-group-label';
    label.textContent = cat.group;
    groupDiv.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'type-grid';
    cat.types.forEach((t, idx) => {
      const opt = document.createElement('div');
      opt.className = 'type-opt';
      opt.dataset.type = t;
      opt.textContent = t;
      // 기본값: 정보확인형/내용이해형 첫 2개만 on
      if ((cat.group === '정보확인형' && idx === 0) || (cat.group === '내용이해형' && idx === 0)) {
        opt.classList.add('on');
      }
      opt.addEventListener('click', () => opt.classList.toggle('on'));
      grid.appendChild(opt);
    });
    groupDiv.appendChild(grid);
    wrap.appendChild(groupDiv);
  });
}
renderTypeGroups();

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
});
fi.addEventListener('change', () => handleFile(fi.files[0]));

function handleFile(f) {
  if (!f) return;
  pdfFile = f;
  document.getElementById('fname').textContent = f.name + ' (' + Math.round(f.size/1024) + 'KB)';
  document.getElementById('fileChip').style.display = 'flex';
  dropzone.style.display = 'none';
  goBtn.disabled = false;
}

function removeFile() {
  pdfFile = null;
  document.getElementById('fileChip').style.display = 'none';
  dropzone.style.display = 'block';
  fi.value = '';
  goBtn.disabled = true;
}

function setProgress(p, msg) {
  document.getElementById('prog').style.display = 'block';
  document.getElementById('progBar').style.width = p + '%';
  document.getElementById('statusMsg').textContent = msg;
}

function showErr(msg) {
  const b = document.getElementById('errBox');
  b.textContent = msg;
  b.style.display = 'block';
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

goBtn.addEventListener('click', async () => {
  if (!pdfFile) return;
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'none';
  goBtn.disabled = true;
  setProgress(15, 'PDF를 읽는 중...');

  try {
    const base64 = await toBase64(pdfFile);
    setProgress(40, '서버로 전송 중...');

    const res = await fetch('/api/analyze-pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pdfBase64: base64 })
    });

    setProgress(75, '응답 처리 중...');

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '분석 실패');

    setProgress(100, '분석 완료!');
    renderResult(data);

  } catch (e) {
    setProgress(0, '');
    document.getElementById('prog').style.display = 'none';
    showErr('오류: ' + e.message);
  } finally {
    goBtn.disabled = false;
  }
});

function renderResult(data) {
  analyzedItems = data.items || [];
  analyzedSets = data.sets || [];
  const setMap = {};
  analyzedSets.forEach(s => s.numbers.forEach(n => setMap[n] = s));

  document.getElementById('statItems').textContent = analyzedItems.length;
  document.getElementById('statSets').textContent = analyzedSets.length;
  const avg = analyzedItems.length ? Math.round(analyzedItems.reduce((a,i) => a + (i.wordCount||0), 0) / analyzedItems.length) : 0;
  document.getElementById('statWords').textContent = avg;

  const list = document.getElementById('itemList');
  list.innerHTML = '';

  analyzedItems.forEach(item => {
    const inSet = setMap[item.number];
    const div = document.createElement('div');
    div.className = 'item-row' + (inSet ? ' set-item' : '');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = true;
    checkbox.dataset.number = item.number;
    checkbox.addEventListener('change', updateSelCount);

    const badge = document.createElement('div');
    badge.className = 'num-badge' + (inSet ? ' warn' : '');
    badge.textContent = item.number;

    const body = document.createElement('div');
    body.className = 'item-body';

    const title = document.createElement('div');
    title.className = 'item-title';
    title.textContent = item.type || '유형 미상';
    const tag = document.createElement('span');
    const grp = findGroup(item.type);
    if (inSet) {
      tag.className = 'tag tag-set';
      tag.textContent = '세트 ' + inSet.numbers.join('~') + '번';
    } else {
      tag.className = 'tag ' + (GROUP_COLORS[grp] || 'tag-blue');
      tag.textContent = grp || '단일';
    }
    title.appendChild(tag);

    const sub = document.createElement('div');
    sub.className = 'item-sub';
    sub.textContent = '지문 약 ' + (item.wordCount || '?') + '단어';

    body.appendChild(title);
    body.appendChild(sub);

    if (item.passagePreview) {
      const prev = document.createElement('div');
      prev.className = 'item-passage';
      prev.textContent = '"' + item.passagePreview + ' ..."';
      body.appendChild(prev);
    }

    div.appendChild(checkbox);
    div.appendChild(badge);
    div.appendChild(body);
    list.appendChild(div);
  });

  document.getElementById('resultWrap').style.display = 'block';
  updateSelCount();
}

function updateSelCount() {
  const checked = document.querySelectorAll('#itemList input[type=checkbox]:checked');
  document.getElementById('selCount').textContent = checked.length + '개 선택됨';
  document.getElementById('toGenBtn').disabled = checked.length === 0;
}

function toggleAll() {
  const boxes = document.querySelectorAll('#itemList input[type=checkbox]');
  const allChecked = [...boxes].every(b => b.checked);
  boxes.forEach(b => b.checked = !allChecked);
  updateSelCount();
}

function openGenPanel() {
  document.getElementById('genPanel').style.display = 'block';
  document.getElementById('genPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// === 2단계: 생성 설정 인터랙션 ===
const multSlider = document.getElementById('multSlider');
multSlider.addEventListener('input', () => {
  document.getElementById('multVal').textContent = multSlider.value + '배';
});

const diffSlider = document.getElementById('diffSlider');
diffSlider.addEventListener('input', () => {
  const m = { '-1': '난이도 낮춤', '0': '원본', '1': '난이도 높임' };
  document.getElementById('diffVal').textContent = m[diffSlider.value];
});

// (유형 클릭 이벤트는 renderTypeGroups() 안에서 동적으로 등록됨)

document.getElementById('genBtn').addEventListener('click', async () => {
  const selectedNumbers = [...document.querySelectorAll('#itemList input[type=checkbox]:checked')]
    .map(cb => parseInt(cb.dataset.number));
  const selectedItems = analyzedItems.filter(it => selectedNumbers.includes(it.number));

  const selectedTypes = [...document.querySelectorAll('.type-opt.on')].map(o => o.dataset.type);
  if (selectedTypes.length === 0) {
    document.getElementById('genErrBox').textContent = '문제 유형을 최소 1개 선택해주세요';
    document.getElementById('genErrBox').style.display = 'block';
    return;
  }

  const mult = parseInt(multSlider.value);
  const diffMap = { '-1': '낮춤 (더 쉽게)', '0': '원본과 동일', '1': '높임 (더 어렵게)' };
  const diffLabel = diffMap[diffSlider.value];

  document.getElementById('genErrBox').style.display = 'none';
  document.getElementById('genResult').style.display = 'none';
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genProg').style.display = 'block';
  document.getElementById('genProgBar').style.width = '20%';
  document.getElementById('genStatusMsg').textContent = '문제 생성 중...';

  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: selectedItems,
        multiplier: mult,
        difficulty: diffLabel,
        types: selectedTypes
      })
    });

    document.getElementById('genProgBar').style.width = '75%';
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '생성 실패');

    document.getElementById('genProgBar').style.width = '100%';
    document.getElementById('genStatusMsg').textContent = '생성 완료!';
    renderGenResult(data);

  } catch (e) {
    document.getElementById('genProg').style.display = 'none';
    document.getElementById('genStatusMsg').textContent = '';
    document.getElementById('genErrBox').textContent = '오류: ' + e.message;
    document.getElementById('genErrBox').style.display = 'block';
  } finally {
    document.getElementById('genBtn').disabled = false;
  }
});

function renderGenResult(data) {
  const questions = data.questions || [];
  const list = document.getElementById('genQList');
  list.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'gen-q-card';

    const head = document.createElement('div');
    head.className = 'gen-q-head';
    head.textContent = '[원문 ' + q.sourceNumber + '번 기반] ' + q.type + ' · 문제 ' + (idx + 1);

    const text = document.createElement('div');
    text.className = 'gen-q-text';
    text.textContent = q.question;

    const opts = document.createElement('div');
    opts.className = 'gen-q-opts';
    if (Array.isArray(q.options)) {
      opts.innerHTML = q.options.map((o, i) => `${i+1}. ${o}`).join('<br>');
    }

    const answer = document.createElement('div');
    answer.className = 'gen-q-answer';
    answer.textContent = '정답: ' + q.answer + (q.explanation ? ' · ' + q.explanation : '');

    card.appendChild(head);
    card.appendChild(text);
    card.appendChild(opts);
    card.appendChild(answer);
    list.appendChild(card);
  });

  document.getElementById('genResult').style.display = 'block';
  document.getElementById('genResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
